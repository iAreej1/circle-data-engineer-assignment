services:

  postgres:
    image: postgres:16

    container_name: circle_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: circle_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data

  pipeline:

    build: .

    container_name: circle_pipeline

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: circle_db
      DB_USER: postgres
      DB_PASSWORD: postgres

      SEED: "6147"

    volumes:
      - .:/app

volumes:

  postgres_data: